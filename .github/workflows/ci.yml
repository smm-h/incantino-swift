name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    defaults:
      run:
        working-directory: ios
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
      - run: swift build
      - run: swift test
